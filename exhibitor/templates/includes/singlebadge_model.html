<div class="modal-body" style="padding: 25px; max-height: 70vh; overflow-y: auto;">
    <form method="POST" action="{% url 'create_single_badge' %}" id="createBadgeForm" novalidate>
        {% csrf_token %}
        <input type="hidden" name="attendee_id" id="attendeeId">
        <div id="globalFormError"
            style="display:none; background:#fdf2f2; border:1px solid #e74c3c; color:#c0392b; padding:12px 16px; border-radius:6px; margin-bottom:16px; font-size:14px;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="globalFormErrorMsg"></span>
        </div>
        <div id="globalFormSuccess"
            style="display:none; background:#f0fdf4; border:1px solid #2ecc71; color:#27ae60; padding:12px 16px; border-radius:6px; margin-bottom:16px; font-size:14px;">

            <i class="fas fa-check-circle me-2"></i>
            <span id="globalFormSuccessMsg"></span>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">First Name <span
                        class="text-danger">*</span></label>
                <input type="text" name="first_name" class="form-control" id="firstName"
                    placeholder="Enter your firstname" required style="border: 1px solid #ddd; padding: 10px 12px;">
                <div class="validation-error" id="firstNameError"><i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Last Name
                    <span class="text-danger"></span></label>
                <input type="text" name="last_name" class="form-control" id="lastName" placeholder="Enter your lastname"
                    style="border: 1px solid #ddd; padding: 10px 12px;">
                <div class="validation-error" id="lastNameError"><i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Job Title
                    <span class="text-danger"></span></label>
                <input type="text" name="job_title" class="form-control" id="jobTitle"
                    placeholder="Enter your job title" style="border: 1px solid #ddd; padding: 10px 12px;">
                <div class="validation-error" id="jobTitleError"><i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Company Name
                    <span class="text-danger"></span></label>
                <input type="text" name="company_name" class="form-control" id="companyName"
                    placeholder="Enter your company name" style="border: 1px solid #ddd; padding: 10px 12px;">
                <div class="validation-error" id="companyNameError"><i
                        class="fas fa-exclamation-circle"></i><span></span></div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Country of Residence <span
                        class="text-danger">*</span></label>
                <select name="country_of_residence" class="form-select select2-country" id="countryResidence" required
                    style="width: 100%;">
                    <option value="">Select Country</option>
                </select>
                <div class="validation-error" id="countryResidenceError">
                    <i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Nationality <span
                        class="text-danger">*</span></label>
                <select name="nationality" class="form-select select2-country" id="nationality" required
                    style="width: 100%;">
                    <option value="">Select Nationality</option>
                </select>
                <div class="validation-error" id="nationalityError">
                    <i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Email <span
                        class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" id="email" placeholder="Enter email" required
                    style="border: 1px solid #ddd; padding: 10px 12px; height: 42px;">
                <div class="validation-error" id="emailError"><i class="fas fa-exclamation-circle"></i><span></span>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" style="font-weight: 600; color: #333;">Mobile Number
                    <span class="text-danger"></span></label>
                <div class="phone-input-wrapper">
                    <input type="tel" class="form-control" name="mobile_number" id="mobileNumber"
                        placeholder="Enter mobile number" style="border: 1px solid #ddd;">
                </div>
                <div class="validation-error" id="mobileNumberError"><i
                        class="fas fa-exclamation-circle"></i><span></span></div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <label class="form-label" style="font-weight: 600; color: #333;">Ticket Type <span
                        class="text-danger">*</span></label>
                <select name="ticket_type" class="form-select select2-modal" id="ticketType" required
                    style="width: 100%;">
                    <option value="">Select Ticket Type</option>
                    <option value="VIP">VIP Pass - 10.0 AED</option>
                    <option value="EXHIBITOR">Exhibitor Pass - Free</option>
                    <option value="VISITOR">Visitor Pass - Free</option>
                </select>
                <div class="validation-error" id="ticketTypeError"><i
                        class="fas fa-exclamation-circle"></i><span></span></div>
            </div>
            <div class="col-md-6 mb-4" id="statusFieldRow" style="display: none;">
                <label class="form-label" style="font-weight: 600; color: #333;">Status</label>
                <select name="status" class="form-select" id="attendeeStatus">
                    <option value="PENDING">Pending</option>
                    <option value="INVITED">Invited</option>
                    <option value="CONFIRMED">Confirmed</option>
                </select>
            </div>
        </div>

        <div class="consent-section" id="consentSection" style="padding-top: 10px;">
            <div class="form-check mb-3">
                <input class="form-check-input" name="accepted_terms" type="checkbox" id="consent1" required
                    style="margin-top: 3px;">
                <label class="form-check-label" for="consent1" style="font-size: 13px; color: #555; line-height: 1.6;">
                    I confirm that I am 21 years of age or older, and I have read and agree to the <a href="#"
                        style="color: #e74c3c;">Terms & Conditions</a> and <a href="#" style="color: #e74c3c;">Privacy
                        Policy</a>. I understand that my personal data will be processed and, where necessary, shared
                    with contracted service providers, exhibitors, sponsors, and partners to deliver event services,
                    facilitate my participation, and manage follow-ups or communications related to this event. <span
                        class="text-danger">*</span>
                </label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" name="accepted_data_sharing" type="checkbox" id="consent2" required
                    style="margin-top: 3px;">
                <label class="form-check-label" for="consent2" style="font-size: 13px; color: #555; line-height: 1.6;">
                    I understand that if I allow an exhibitor or sponsor at the event to scan my badge, whether physical
                    or digital (e.g., via the Mobile App), I am providing them with my personal data. I acknowledge that
                    the organizers have no control over any third-party use of this data and cannot be held liable for
                    such use to the extent permitted by law.
                     <!-- <span class="text-danger">*</span> -->
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" name="accepted_marketing" type="checkbox" id="consent3"
                    style="margin-top: 3px;">
                <label class="form-check-label" for="consent3" style="font-size: 13px; color: #555; line-height: 1.6;">
                    I consent to Kaoun International Limited and Dubai World Trade Centre, and where necessary their
                    contracted service providers, exhibitors, sponsors, and partners, using my personal data for
                    communications & marketing their products, services, and future events. I understand that I can
                    withdraw my consent at any time.
                </label>
            </div>
        </div>
        <div class="modal-footer border-top justify-content-end" style="background: #f5f5f5; padding: 15px 25px;">
            <button type="submit" class="btn px-4 py-2 me-2" id="submitBadgeBtn"
                style="background: #e74c3c; color: white; border-radius: 6px; font-weight: 500; min-width: 120px;">
                REGISTER
            </button>
            <button type="button" class="btn px-4 py-2" data-bs-dismiss="modal"
                style="background: #6c757d; color: white; border-radius: 6px; font-weight: 500; min-width: 100px;">
                CLOSE
            </button>
        </div>
    </form>
</div>

<!-- Success Modal -->
<div class="modal fade" id="badgeSuccessModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
        <div class="modal-content" style="border:none;border-radius:12px;overflow:hidden;">

            <div class="modal-body text-center" style="padding:40px 30px;">
                <!-- Icon -->
                <div style="width:72px;height:72px;background:#d1fae5;border-radius:50%;
                    display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;">
                    <i class="fas fa-check" style="font-size:32px;color:#059669;"></i>
                </div>

                <h5 style="font-weight:700;color:#111;margin-bottom:8px;">Registration Successful!</h5>
                <p id="badgeSuccessMsg" style="color:#555;font-size:14px;margin-bottom:24px;"></p>

                <button type="button" class="btn px-5 py-2" id="badgeSuccessOkBtn"
                    style="background:#e74c3c;color:white;border:none;border-radius:6px;font-weight:600;">
                    OK
                </button>
            </div>

        </div>
    </div>
</div>

{% load static %}
<script src="{% static 'js/constants.js' %}"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        // ── Move success modal to body ──────────────────────────────────────────
        const successModal = document.getElementById("badgeSuccessModal");
        if (successModal && successModal.parentElement !== document.body) {
            document.body.appendChild(successModal);
        }


        // ── Populate selects BEFORE modal opens ─────────────────────────────────
        function populateCountrySelect(selectId, useNationality = false) {
            const select = document.getElementById(selectId);
            if (!select || select.dataset.populated) return; // prevent double population
            COUNTRIES.forEach(c => {
                const opt = document.createElement("option");
                opt.value = useNationality ? c.nationality : c.name;
                opt.dataset.code = c.code;
                opt.text = useNationality ? c.nationality : c.name;
                select.appendChild(opt);
            });
            select.dataset.populated = "true";
        }

        populateCountrySelect("countryResidence", false);
        populateCountrySelect("nationality", true);

        // ── Flag image helper ───────────────────────────────────────────────────
        function getFlagImg(code) {
            return `<img src="https://flagcdn.com/20x15/${code.toLowerCase()}.png"
                     width="20" height="15"
                     style="margin-right:6px;vertical-align:middle;border-radius:2px;flex-shrink:0;"
                     onerror="this.style.display='none'">`;
        }

        // ── Select2 templates ───────────────────────────────────────────────────
        function countryTemplate(option) {
            if (!option.id) return option.text;
            const code = option.element && option.element.dataset.code;
            if (!code) return option.text;
            return $(`<span style="display:flex;align-items:center;">
                    ${getFlagImg(code)}<span>${option.text}</span>
                  </span>`);
        }

        function countrySelection(option) {
            if (!option.id) return option.text;
            const code = option.element && option.element.dataset.code;
            if (!code) return option.text;
            return $(`<span style="display:flex;align-items:center;">
                    ${getFlagImg(code)}<span>${option.text}</span>
                  </span>`);
        }

        // ── Key fix: init country Select2 on modal shown, AFTER base.html runs ──
        const createModalEl = document.getElementById('createBadgeModal');

        createModalEl.addEventListener('shown.bs.modal', function () {
            // Destroy existing Select2 on country fields first
            if ($('#countryResidence').hasClass('select2-hidden-accessible')) {
                $('#countryResidence').select2('destroy');
            }
            if ($('#nationality').hasClass('select2-hidden-accessible')) {
                $('#nationality').select2('destroy');
            }

            // Re-init with flag templates
            $('#countryResidence').select2({
                theme: 'bootstrap-5',
                dropdownParent: $('#createBadgeModal'),
                allowClear: true,
                placeholder: "Select Country",
                templateResult: countryTemplate,
                templateSelection: countrySelection,
                width: '100%'
            });

            $('#nationality').select2({
                theme: 'bootstrap-5',
                dropdownParent: $('#createBadgeModal'),
                allowClear: true,
                placeholder: "Select Nationality",
                templateResult: countryTemplate,
                templateSelection: countrySelection,
                width: '100%'
            });
        });

        // Handle population for Edit mode
        createModalEl.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const form = document.getElementById("createBadgeForm");
            const isEdit = button && button.classList.contains('edit');
            
            // Reset form and UI
            form.reset();
            document.getElementById('attendeeId').value = '';
            document.getElementById('statusFieldRow').style.display = 'none';
            document.getElementById('consentSection').style.display = 'block';
            document.getElementById('submitBadgeBtn').innerText = 'REGISTER';
            
            // Clear errors
            document.getElementById("globalFormError").style.display = "none";
            document.querySelectorAll(".validation-error").forEach(el => el.style.display = "none");
            document.querySelectorAll(".form-control, .form-select").forEach(el => el.style.border = "1px solid #ddd");

            if (isEdit) {
                const attendeeId = button.closest('tr').dataset.attendeeId;
                document.getElementById('attendeeId').value = attendeeId;
                document.getElementById('statusFieldRow').style.display = 'block';
                document.getElementById('consentSection').style.display = 'none'; // Usually hide consents on edit
                document.getElementById('submitBadgeBtn').innerText = 'SAVE CHANGES';

                // ── Disable fields that should not be editable ──
                document.getElementById('email').disabled = true;
                document.getElementById('email').style.background = '#f5f5f5';
                document.getElementById('attendeeStatus').disabled = true;
                document.getElementById('attendeeStatus').style.background = '#f5f5f5';
                document.getElementById('ticketType').disabled = true;
                document.getElementById('ticketType').style.background = '#f5f5f5';
                $('#ticketType').trigger('change');
                
                // Set modal title if it exists
                const titleEl = createModalEl.querySelector('.modal-title');
                if (titleEl) titleEl.innerText = 'Edit Registration';

                fetch(`/get-attendee/${attendeeId}/`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            const a = data.attendee;
                            document.getElementById('firstName').value = a.first_name || '';
                            document.getElementById('lastName').value = a.last_name || '';
                            document.getElementById('jobTitle').value = a.job_title || '';
                            document.getElementById('companyName').value = a.company_name || '';
                            document.getElementById('email').value = a.email || '';
                            document.getElementById('ticketType').value = a.ticket_type || '';
                            document.getElementById('attendeeStatus').value = a.status || 'PENDING';
                            
                            // Trigger Select2 updates
                            $('#countryResidence').val(a.country_of_residence).trigger('change');
                            $('#nationality').val(a.nationality).trigger('change');
                            $('#ticketType').trigger('change');
                            
                            const mobileInput = document.getElementById('mobileNumber');
                            if (mobileInput && mobileInput.itiInstance) {
                                mobileInput.itiInstance.setNumber(a.mobile_number || '');
                            } else {
                                mobileInput.value = a.mobile_number || '';
                            }
                        }
                    });
            } else {
                  // ── Re-enable fields for create mode (reset bg too) ──
                    document.getElementById('email').style.background = '';
                    document.getElementById('email').disabled = false;
                    document.getElementById('ticketType').disabled = false;
                    document.getElementById('attendeeStatus').style.background = '';
                    document.getElementById('ticketType').style.background = '';
                const titleEl = createModalEl.querySelector('.modal-title');
                if (titleEl) titleEl.innerText = 'GULFOOD 2026';
            }
        });

        // ── Remove select2-country from base.html's generic class ───────────────
        document.getElementById('countryResidence').classList.remove('select2-modal');
        document.getElementById('nationality').classList.remove('select2-modal');

        // ── Success OK button ───────────────────────────────────────────────────
        document.getElementById("badgeSuccessOkBtn").addEventListener("click", function () {
            const modalEl = document.getElementById("badgeSuccessModal");
            const modal = bootstrap.Modal.getInstance(modalEl) || bootstrap.Modal.getOrCreateInstance(modalEl);
            if (modal) modal.hide();
            
            if (window.refreshRegistrations) {
                window.refreshRegistrations(); // Refresh to see changes without reload
            } else {
                location.reload();
            }
        });

        // ── Form submit ─────────────────────────────────────────────────────────
        document.getElementById("createBadgeForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const form = this;
            const attendeeId = document.getElementById('attendeeId').value;
            const method = attendeeId ? "PUT" : "POST";
            const action = attendeeId ? `/update-attendee/${attendeeId}/` : form.action;
            
            const formData = new FormData(form);

            document.querySelectorAll(".validation-error span").forEach(el => el.innerText = "");
            document.querySelectorAll(".form-control, .form-select").forEach(el => el.style.border = "1px solid #ddd");

            // ── Name Validation ──────────────────────────────────────────────────
            const nameRegex = /^[A-Za-z\s]+$/;
            const fName = formData.get('first_name')?.trim();
            const lName = formData.get('last_name')?.trim();
            let stopSubmit = false;

            if (!fName) {
                const errSpan = document.getElementById("firstNameError").querySelector("span");
                if (errSpan) errSpan.innerText = "First name is required.";
                document.getElementById("firstNameError").style.display = "block";
                highlightFieldError('first_name');
                stopSubmit = true;
            } else if (!nameRegex.test(fName)) {
                const errSpan = document.getElementById("firstNameError").querySelector("span");
                if (errSpan) errSpan.innerText = "First name should only contain letters.";
                document.getElementById("firstNameError").style.display = "block";
                highlightFieldError('first_name');
                stopSubmit = true;
            }

            if (lName && !nameRegex.test(lName)) {
                const errSpan = document.getElementById("lastNameError").querySelector("span");
                if (errSpan) errSpan.innerText = "Last name should only contain letters.";
                document.getElementById("lastNameError").style.display = "block";
                highlightFieldError('last_name');
                stopSubmit = true;
            }

            if (stopSubmit) {
                createModalEl.querySelector(".modal-body").scrollTop = 0;
                return;
            }

            const mobileInput = document.querySelector("#mobileNumber");
            const itiInstance = mobileInput.itiInstance; 

            if (mobileInput.value.trim() !== "") {
                if (!itiInstance) {
                    const phoneRegex = /^[0-9+\-\s()]{8,20}$/;
                    if (!phoneRegex.test(mobileInput.value)) {
                        document.getElementById("mobileNumberError").querySelector("span").innerText = "Invalid mobile number format.";
                        document.getElementById("mobileNumberError").style.display = "block";
                        mobileInput.style.border = "1px solid red";
                        return;
                    }
                    formData.set("mobile_number", mobileInput.value.trim());
                } else {
                    if (!itiInstance.isValidNumber()) {
                        const errorMsg = itiInstance.getValidationError();
                        let message = "Invalid mobile number.";
                        if (errorMsg === 0) message = "Invalid number.";
                        else if (errorMsg === 1) message = "Invalid country code.";
                        else if (errorMsg === 2) message = "Number too short.";
                        else if (errorMsg === 3) message = "Number too long.";
                        document.getElementById("mobileNumberError").querySelector("span").innerText = message;
                        document.getElementById("mobileNumberError").style.display = "block";
                        mobileInput.style.border = "1px solid red";
                        return;
                    }
                    formData.set("mobile_number", itiInstance.getNumber());
                }
            }

            let fetchBody = formData;
            let headers = { "X-CSRFToken": getCSRFToken() };
            
            if (method === "PUT") {
    const payload = Object.fromEntries(formData);

    // ── Disabled fields are excluded from FormData by the browser.
    //    Read them directly from the DOM and add them back manually. ──
    const emailEl      = document.getElementById('email');
    const ticketEl     = document.getElementById('ticketType');
    const statusEl     = document.getElementById('attendeeStatus');

    if (emailEl && emailEl.disabled)  payload.email       = emailEl.value.trim();
    if (ticketEl && ticketEl.disabled) payload.ticket_type = ticketEl.value.trim();
    if (statusEl && statusEl.disabled) payload.status      = statusEl.value.trim();

    fetchBody = JSON.stringify(payload);
    headers["Content-Type"] = "application/json";
}

            fetch(action, {
                method: method,
                body: fetchBody,
                headers: headers
            })
                .then(res => res.json().then(data => ({ status: res.status, body: data })))
                .then(({ status, body }) => {
                    document.getElementById("globalFormError").style.display = "none";
                    document.getElementById("globalFormSuccess").style.display = "none";

                    if (!body.success) {
                        if (typeof body.errors === "string") {
                            document.getElementById("globalFormErrorMsg").innerText = body.errors;
                            document.getElementById("globalFormError").style.display = "block";
                            createModalEl.querySelector(".modal-body").scrollTop = 0;
                            return;
                        }
                        for (let field in body.errors) {
                            let errorDiv = document.getElementById(fieldMap[field]);
                            if (errorDiv) {
                                let span = errorDiv.querySelector("span");
                                if (span) { span.innerText = body.errors[field]; errorDiv.style.display = "block"; }
                            }
                            highlightFieldError(field);
                        }
                    } else {
                        form.reset();
    if (itiInstance) itiInstance.setCountry("in");

    $('#countryResidence, #nationality, #ticketType')
        .next('.select2-container').find('.select2-selection')
        .css('border', '1px solid #ddd');

    $('#countryResidence, #nationality').val(null).trigger('change');
    $('.select2-modal').val(null).trigger('change');

    document.querySelectorAll(".validation-error").forEach(el => el.style.display = "none");
    document.querySelectorAll(".validation-error span").forEach(el => el.innerText = "");
    document.querySelectorAll(".form-control, .form-select").forEach(el => el.style.border = "1px solid #ddd");

    document.getElementById("badgeSuccessMsg").innerText = body.message || "Operation successful.";

    // ── Store task id so we can show email errors after the modal closes ──
    const emailTaskId = body.email_task_id || null;

    createModalEl.addEventListener('hidden.bs.modal', function handler() {
        createModalEl.removeEventListener('hidden.bs.modal', handler);
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
        document.body.classList.remove('modal-open');
        document.body.style.removeProperty('overflow');
        document.body.style.removeProperty('padding-right');

        setTimeout(() => {
            const successModalEl = document.getElementById("badgeSuccessModal");
            bootstrap.Modal.getOrCreateInstance(successModalEl).show();
        }, 100);

        // ── Poll for email task result ──────────────────────────────────
        if (emailTaskId) {
            pollEmailTask(emailTaskId);
        }
    });

    bootstrap.Modal.getOrCreateInstance(createModalEl).hide();
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("globalFormErrorMsg").innerText = "Something Went Wrong";
                    document.getElementById("globalFormError").style.display = "block";
                    createModalEl.querySelector(".modal-body").scrollTop = 0;
                });
        });

        function pollEmailTask(taskId, attempts = 0) {
    const MAX_ATTEMPTS = 20;   // 20 × 3 s = 60 s max wait
    const INTERVAL_MS  = 3000;

    if (attempts >= MAX_ATTEMPTS) {
        // Timed out — don't bother the user, just log
        console.warn("Email task polling timed out for task:", taskId);
        return;
    }

    fetch(`/badge-email-status/${taskId}/`)
        .then(r => r.json())
        .then(data => {
            if (data.state === "PENDING" || data.state === "STARTED" || data.state === "RETRY") {
                // Still running — check again later
                setTimeout(() => pollEmailTask(taskId, attempts + 1), INTERVAL_MS);
                return;
            }

            // Task finished
            if (!data.success && data.error) {
                // Re-open the create modal and show the error at the top
                const createModal = bootstrap.Modal.getOrCreateInstance(
                    document.getElementById("createBadgeModal")
                );
                createModal.show();

                // Wait a tick for the modal to render before scrolling
                setTimeout(() => {
                    document.getElementById("globalFormErrorMsg").innerText = data.error;
                    document.getElementById("globalFormError").style.display = "block";
                    document.getElementById("createBadgeModal")
                        .querySelector(".modal-body").scrollTop = 0;
                }, 150);
            }
            // data.success === true → all good, nothing to show
        })
        .catch(err => {
            console.error("Email task poll error:", err);
        });
}

        function getCSRFToken() {
            return document.cookie.split("; ").find(row => row.startsWith("csrftoken"))?.split("=")[1];
        }

        const fieldMap = {
            first_name: "firstNameError",
            last_name: "lastNameError",
            job_title: "jobTitleError",
            company_name: "companyNameError",
            country_of_residence: "countryResidenceError",
            nationality: "nationalityError",
            email: "emailError",
            mobile_number: "mobileNumberError",
            ticket_type: "ticketTypeError"
        };

        document.querySelectorAll(".form-control").forEach(input => {
            input.addEventListener("input", function () { clearFieldError(this.name); });
        });
        document.querySelectorAll(".form-select").forEach(input => {
            input.addEventListener("change", function () { clearFieldError(this.name); });
        });
        $('#countryResidence, #nationality, .select2-modal').on('select2:select', function () {
    clearFieldError(this.name);
});

// ── Sync phone flag when country of residence changes ───────────────────
$('#countryResidence').on('select2:select select2:clear', function () {
    const mobileInput = document.getElementById('mobileNumber');
    const itiInstance = mobileInput && mobileInput.itiInstance;
    if (!itiInstance) return;

    const selectedOption = this.options[this.selectedIndex];
    const code = selectedOption && selectedOption.dataset.code;   // ISO2 code stored in data-code

    if (code) {
        itiInstance.setCountry(code.toLowerCase());
    } else {
        itiInstance.setCountry("us");   // fallback on clear
    }
});

        function clearFieldError(fieldName) {
            const errorId = fieldMap[fieldName];
            if (!errorId) return;
            const errorDiv = document.getElementById(errorId);
            if (errorDiv) {
                const span = errorDiv.querySelector("span");
                if (span) span.innerText = "";
                errorDiv.style.display = "none";
            }
            const input = document.querySelector(`[name="${fieldName}"]`);
            if (!input) return;
            if ($(input).hasClass('select2-hidden-accessible')) {
                $(input).next('.select2-container').find('.select2-selection').css('border', '1px solid #ddd');
            } else {
                input.style.border = "1px solid #ddd";
            }
        }

        function highlightFieldError(fieldName) {
            const input = document.querySelector(`[name="${fieldName}"]`);
            if (!input) return;
            if ($(input).hasClass('select2-hidden-accessible')) {
                $(input).next('.select2-container').find('.select2-selection').css({
                    'border': '1px solid red',
                    'border-radius': '4px'
                });
            } else {
                input.style.border = "1px solid red";
            }
        }

    });
</script>
