<!-- Registrations Section -->
<div class="registrations-section animate-fade-in">
    <div class="registrations-header">
        <div class="d-flex align-items-center gap-3">
            <h5>Registrations</h5>
            <button class="btn btn-danger btn-sm" id="bulkDeleteBtn" style="display:none; border-radius: 6px; padding: 6px 14px; font-weight: 500;">
                <i class="fas fa-trash-alt me-2"></i>Delete Selected (<span id="selectedCount">0</span>)
            </button>
        </div>
        <a href="/export-registrations/" class="btn btn-export" id="exportBtn">
            <i class="fas fa-file-excel me-2"></i>Export to Excel
        </a>
    </div>

    <!-- Filters -->
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Keyword</label>
                <input type="text" class="form-control" placeholder="Search..." id="searchKeyword">
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select select2-filter" id="filterStatus" style="width: 100%;">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="invited">Invited</option>
                    <option value="confirmed">Confirmed</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Tickets</label>
                <select class="form-select select2-filter" id="filterTickets" style="width: 100%;">
                    <option value="">All Tickets</option>
                    <option value="VIP">VIP Pass</option>
                    <option value="exhibitor">Exhibitor Pass</option>
                    <option value="visitor">Visitor Pass</option>
                </select>
            </div>
            <div class="col-md-auto">
                <button class="btn btn-primary" id="applyFiltersBtn">
                    <i class="fas fa-search me-1"></i> Search
                </button>
                <button class="btn btn-outline-secondary ms-2" id="clearFiltersBtn">
                    <i class="fas fa-times me-1"></i> Clear
                </button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-hover" id="registrationsTable">
            <thead>
                <tr>
                    <th style="width: 40px; padding-left: 15px;">
                        <input type="checkbox" class="form-check-input" id="selectAllRegistrations">
                    </th>
                    <th>NAME</th>
                    <th>JOB TITLE</th>
                    <th>COUNTRY</th>
                    <th>NATIONALITY</th>
                    <th>PHONE NO</th>
                    <th>SOURCE</th>
                    <th>TICKET CLASS</th>
                    <th>COMPANY NAME</th>
                    <th>STATUS</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="registrationsTableBody">
                <!-- Rows will be populated by AJAX -->
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-wrapper" style="margin-top: 20px; padding: 15px 0; border-top: 1px solid #e5e7eb;">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="pagination-info" id="paginationInfo" style="color: #6b7280; font-size: 14px;">
                    Showing 0 to 0 of 0 entries
                </div>
            </div>
            <div class="col-md-6">
                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-end" id="registrationsPagination" style="margin: 0; gap: 5px;">
                        <!-- Pagination will be populated by AJAX -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="page-size-selector" style="margin-top: 10px; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
        <label style="color: #6b7280; font-size: 14px; margin: 0;">Show</label>
        <select id="pageSizeSelect" class="form-select form-select-sm" style="width: auto; border-radius: 6px;">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        <span style="color: #6b7280; font-size: 14px;">entries per page</span>
    </div>
</div>
